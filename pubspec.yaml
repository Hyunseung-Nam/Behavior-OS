name: behavior_os
description: 행동 운영체제 - 해야 할 순간에 행동을 강제하는 개인 신호 시스템
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 상태 관리
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 알림 코어 (오프라인 100% 동작)
  flutter_local_notifications: ^17.2.2

  # 백그라운드 Nagging 재스케줄링
  workmanager: ^0.5.2

  # 타임존 (알람 정확도 핵심)
  timezone: ^0.9.4
  flutter_timezone: ^2.0.0

  # Supabase
  supabase_flutter: ^2.5.6

  # 라우터
  go_router: ^14.2.7

  # 유틸리티
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
